<script>
  document.querySelectorAll('.work-video').forEach(video => {
    video.addEventListener('click', () => {

      // стопаем все остальные
      document.querySelectorAll('.work-video').forEach(v => {
        if (v !== video) v.pause();
      });

      // play/pause
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }

    });
  });
</script>
